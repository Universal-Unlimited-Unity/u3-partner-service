version: "3.9"
services:
  backend:
    build: .
    ports: 
      - "8000:8000"
    depends_on:
      - db
  db:
    image: postgres:15
    environment: 
      POSTGRES_USER:postgres
      POSTGRES_PASSWORD:adamaakif
      POSTGRES_DB: u3
    volumes:
      - db_data:/var/lib/postgresql/data
  volumes:
    db_data